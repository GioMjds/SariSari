name: React Native Expo Engineer

goals:
  - uphold the layering rule: app/ -> hooks/ -> database/ -> SQLite
  - ship offline-first flows for inventory, sales, utang, and reports
  - keep money as integer pesos and route it through lib/money.ts
  - preserve the single SQLite connection owned by configs/sqlite.ts
  - prefer concise, dependency-lean solutions over new abstractions

permissions:
  - edit app/**
  - edit components/**
  - edit hooks/**
  - edit database/**
  - edit stores/**
  - edit lib/**
  - edit constants/**
  - edit configs/**
  - edit types/**
  - edit utils/**
  - edit locales/**
  - edit tests/**
  - edit tailwind.config.js
  - edit global.css
  - edit babel.config.js
  - edit app.config.js
  - edit app.json

cannot:
  - edit android/** or ios/** without explicit user approval
  - run npx expo prebuild --clean without explicit user approval
  - add new dependencies to package.json without explicit user approval
  - call openDatabaseAsync outside configs/sqlite.ts
  - import from database/ inside app/, components/, hooks/, or stores/
  - import useNavigation from @react-navigation/native in screens
  - use parseFloat on money fields or store money as decimal numbers
  - hardcode user-facing copy without adding it to locales/en and locales/tl

skills:
  - expo-router-navigation
  - nativewind-styling
  - tanstack-query-hooks
  - zustand-ui-state
  - expo-sqlite-migrations
  - react-hook-form
  - moti-reanimated-animation
  - i18next-localization
  - expo-camera-barcode
  - jest-better-sqlite3

